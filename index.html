<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhishek Choudhary — Data Scientist</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --bg2: #111111;
      --bg3: #161616;
      --border: rgba(255,255,255,0.07);
      --chrome-start: #646973;
      --chrome-end: #BBCCD7;
      --accent1: #a855f7;
      --accent2: #ec4899;
      --accent3: #f97316;
      --text: #e2e8f0;
      --muted: #64748b;
      --font: 'Kanit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 4rem;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 1.1rem; font-weight: 600; letter-spacing: 0.08em;
      background: linear-gradient(180deg, var(--chrome-start), var(--chrome-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-cta {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.55rem 1.4rem; border-radius: 999px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      color: #fff; text-decoration: none; transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8rem 2rem 4rem;
      position: relative; overflow: hidden;
      text-align: center;
    }
    .hero-grid-bg {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }
    .hero-glow {
      position: absolute; width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.15em;
      color: var(--accent1); border: 1px solid rgba(168,85,247,0.3);
      padding: 0.4rem 1rem; border-radius: 999px; margin-bottom: 2rem;
      animation: fadeUp 0.6s ease both;
    }
    .hero-badge::before { content: '●'; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .hero-avatar {
      width: 140px; height: 140px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; font-weight: 900;
      margin: 0 auto 2.5rem;
      position: relative; z-index: 2;
      animation: fadeUp 0.7s 0.1s ease both;
      box-shadow: 0 0 60px rgba(168,85,247,0.35);
    }

    .hero-heading {
      font-size: clamp(3rem, 11vw, 10rem);
      font-weight: 900; line-height: 0.92;
      letter-spacing: -0.02em; white-space: nowrap;
      background: linear-gradient(180deg, var(--chrome-start) 0%, var(--chrome-end) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: fadeUp 0.7s 0.2s ease both;
      overflow: hidden;
    }
    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 400; color: var(--muted); margin: 1.2rem 0 0.5rem;
      animation: fadeUp 0.7s 0.3s ease both;
    }
    .hero-tagline {
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      color: rgba(255,255,255,0.4); margin-bottom: 2.5rem;
      font-family: var(--mono); letter-spacing: 0.05em;
      animation: fadeUp 0.7s 0.35s ease both;
    }

    .social-pills {
      display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.7s 0.45s ease both;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em;
      padding: 0.5rem 1.1rem; border-radius: 999px;
      border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; transition: all 0.2s;
      background: rgba(255,255,255,0.03);
    }
    .pill:hover { border-color: var(--accent1); color: var(--text); background: rgba(168,85,247,0.08); }
    .pill svg { width: 14px; height: 14px; }

    .scroll-hint {
      position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      animation: fadeUp 1s 0.8s ease both;
    }
    .scroll-arrow { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--muted), transparent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTIONS ── */
    section { scroll-margin-top: 80px; }
    .section-inner { max-width: 1100px; margin: 0 auto; padding: 7rem 2rem; }
    .section-label {
      font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent1); margin-bottom: 1rem;
    }
    .section-title {
      font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 700; line-height: 1.05;
      background: linear-gradient(180deg, var(--chrome-start) 0%, var(--chrome-end) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 1.5rem;
    }
    .section-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, var(--accent1), transparent);
      margin-bottom: 4rem; opacity: 0.3;
    }

    /* ── ABOUT ── */
    #about { background: var(--bg2); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .about-bio {
      font-size: 1.15rem; line-height: 1.8; color: rgba(226,232,240,0.75);
      overflow-wrap: normal; word-break: normal;
    }
    .about-bio strong { color: var(--text); font-weight: 500; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
    .stat-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem;
    }
    .stat-num {
      font-size: 2.2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; letter-spacing: 0.05em; }

    /* ── SKILLS ── */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
    .skill-cat {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.75rem;
      transition: border-color 0.3s;
    }
    .skill-cat:hover { border-color: rgba(168,85,247,0.3); }
    .skill-cat-name {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent1); margin-bottom: 1.2rem;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill-tag {
      font-size: 0.78rem; padding: 0.3rem 0.8rem; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono);
    }

    /* ── EXPERIENCE ── */
    #experience { background: var(--bg2); }
    .exp-item { display: grid; grid-template-columns: 80px 1fr; gap: 2rem; padding: 2.5rem 0; border-bottom: 1px solid var(--border); }
    .exp-item:last-child { border-bottom: none; }
    .exp-num { font-family: var(--mono); font-size: 0.75rem; color: var(--accent1); padding-top: 0.25rem; }
    .exp-company { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.3rem; }
    .exp-role { font-size: 0.95rem; color: var(--accent1); margin-bottom: 0.6rem; }
    .exp-meta { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .mono-pill {
      font-family: var(--mono); font-size: 0.7rem;
      padding: 0.25rem 0.7rem; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
    }
    .exp-summary { color: rgba(226,232,240,0.65); font-size: 0.95rem; line-height: 1.7; margin-bottom: 1rem; }
    .exp-highlights { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .exp-highlights li {
      font-size: 0.88rem; color: rgba(226,232,240,0.6);
      padding-left: 1.2rem; position: relative; line-height: 1.6;
    }
    .exp-highlights li::before { content: '→'; position: absolute; left: 0; color: var(--accent1); }

    /* ── PROJECTS ── */
    .projects-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .proj-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.2rem;
      display: grid; grid-template-columns: 1fr auto;
      gap: 2rem; align-items: start;
      transition: border-color 0.3s, transform 0.3s;
      position: relative; overflow: hidden;
    }
    .proj-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(168,85,247,0.04), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .proj-card:hover { border-color: rgba(168,85,247,0.3); transform: translateY(-2px); }
    .proj-card:hover::before { opacity: 1; }
    .proj-card.highlight { border-color: rgba(168,85,247,0.25); }
    .proj-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .proj-num { font-family: var(--mono); font-size: 0.75rem; color: var(--accent1); }
    .proj-highlight-badge {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 4px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff;
    }
    .proj-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.4rem; }
    .proj-subtitle { font-size: 0.9rem; color: var(--accent1); margin-bottom: 0.8rem; }
    .proj-desc { font-size: 0.9rem; color: rgba(226,232,240,0.6); line-height: 1.7; margin-bottom: 1.2rem; }
    .proj-stack { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .stack-tag {
      font-size: 0.72rem; font-family: var(--mono); padding: 0.2rem 0.6rem;
      border-radius: 5px; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); color: var(--muted);
    }
    .proj-year { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
    .proj-link {
      display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1rem;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent1); text-decoration: none; border: 1px solid rgba(168,85,247,0.3);
      padding: 0.45rem 1rem; border-radius: 8px; transition: all 0.2s;
    }
    .proj-link:hover { background: rgba(168,85,247,0.1); border-color: var(--accent1); }

    /* ── SERVICES ── */
    #services { background: var(--bg2); }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
    .svc-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 2rem; transition: border-color 0.3s;
    }
    .svc-card:hover { border-color: rgba(168,85,247,0.3); }
    .svc-num { font-family: var(--mono); font-size: 0.7rem; color: var(--accent1); margin-bottom: 1rem; }
    .svc-icon { font-size: 2rem; margin-bottom: 1rem; }
    .svc-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.6rem; }
    .svc-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.65; }

    /* ── MARQUEE ── */
    #testimonials { background: var(--bg); overflow: hidden; padding: 5rem 0; }
    .marquee-header { max-width: 1100px; margin: 0 auto; padding: 0 2rem 3rem; }
    .marquee-track { display: flex; gap: 1.5rem; width: max-content; animation: marquee 28s linear infinite; }
    .marquee-track:hover { animation-play-state: paused; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @media (prefers-reduced-motion: reduce) { .marquee-track { animation: none; overflow-x: auto; } }
    .testi-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.8rem; width: 320px; flex-shrink: 0;
    }
    .testi-quote { font-size: 0.92rem; font-style: italic; color: rgba(226,232,240,0.7); line-height: 1.7; margin-bottom: 1.2rem; }
    .testi-author { display: flex; align-items: center; gap: 0.75rem; }
    .testi-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: #fff;
    }
    .testi-name { font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .testi-role { font-size: 0.75rem; color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 4rem 2rem 2rem;
    }
    .footer-grid {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 3rem;
      padding-bottom: 3rem; border-bottom: 1px solid var(--border);
    }
    .footer-brand-name {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(180deg, var(--chrome-start), var(--chrome-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.4rem;
    }
    .footer-brand-role { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.25rem; }
    .footer-brand-loc { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); }
    .footer-col-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
    .footer-links a { font-size: 0.88rem; color: rgba(226,232,240,0.6); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--text); }
    .footer-contact { display: flex; flex-direction: column; gap: 0.75rem; }
    .footer-email {
      font-family: var(--mono); font-size: 0.78rem;
      color: var(--accent1); text-decoration: none; transition: opacity 0.2s;
    }
    .footer-email:hover { opacity: 0.7; }
    .footer-bottom {
      max-width: 1100px; margin: 2rem auto 0;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75rem; color: var(--muted);
    }

    /* ── CONTACT ── */
    #contact { background: var(--bg); }
    .contact-inner { max-width: 600px; }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
    .form-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-label { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .form-input, .form-textarea {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.85rem 1rem;
      color: var(--text); font-family: var(--font); font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent1); }
    .form-textarea { min-height: 130px; resize: vertical; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.85rem 2rem; border-radius: 10px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      color: #fff; transition: opacity 0.2s; font-family: var(--font);
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.reveal-left {
      transform: translateX(-40px);
    }
    .reveal.reveal-right {
      transform: translateX(40px);
    }
    .reveal.visible {
      opacity: 1;
      transform: translate(0, 0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }

    /* ── 3D TILT CARDS ── */
    .tilt-card {
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
      transition: transform 0.1s ease, box-shadow 0.3s ease;
      will-change: transform;
    }
    .tilt-card:hover {
      box-shadow: 0 20px 60px rgba(168,85,247,0.15);
    }
    .tilt-card .tilt-shine {
      position: absolute; inset: 0; border-radius: inherit;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 70%);
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1;
    }
    .tilt-card:hover .tilt-shine { opacity: 1; }

    /* ── CURSOR GLOW ── */
    #cursor-glow {
      position: fixed; width: 300px; height: 300px;
      border-radius: 50%; pointer-events: none; z-index: 9999;
      background: radial-gradient(circle, rgba(168,85,247,0.07) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear;
      mix-blend-mode: screen;
    }

    /* ── TOUCH RIPPLE ── */
    .ripple-host { position: relative; overflow: hidden; }
    .ripple-wave {
      position: absolute; border-radius: 50%;
      background: rgba(168,85,247,0.25);
      transform: scale(0); animation: rippleAnim 0.6s linear forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── AVATAR FLOAT ── */
    .hero-avatar {
      animation: fadeUp 0.7s 0.1s ease both, avatarFloat 4s 1s ease-in-out infinite !important;
    }
    @keyframes avatarFloat {
      0%, 100% { transform: translateY(0px); box-shadow: 0 0 60px rgba(168,85,247,0.35); }
      50%       { transform: translateY(-12px); box-shadow: 0 20px 80px rgba(168,85,247,0.5); }
    }

    /* ── HERO PARALLAX LAYER ── */
    .hero-grid-bg { transition: transform 0.05s linear; }
    .hero-glow    { transition: transform 0.08s linear; }
